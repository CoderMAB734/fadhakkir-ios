workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.fadhakkir.app
    scripts:
      - name: Open iOS project
        script: |
          npx cap open ios 
      - name: Build iOS project
        script: |
          npx cap build ios
    artifacts:
      - build/ipa/*.ipa